name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: ./build.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EDR-Windows
          path: |
            dist/EDR-Setup.exe
            dist/EDR-Setup/**
            dist/EDR-Install.zip
            dist/EDR-win64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS package
        run: |
          perl -pi -e 's/\r$//' build-unix.sh scripts/edr scripts/install-macos.sh
          chmod +x build-unix.sh scripts/edr scripts/install-macos.sh
          bash ./build-unix.sh macos
          test -f dist/EDR-Setup.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDR-macOS
          path: dist/EDR-Setup.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux package
        run: |
          sed -i 's/\r$//' build-unix.sh scripts/edr scripts/install-linux.sh
          chmod +x build-unix.sh scripts/edr scripts/install-linux.sh
          bash ./build-unix.sh linux
          test -f dist/EDR-Setup.deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDR-Linux
          path: dist/EDR-Setup.deb

  # Windows is required for a public release; Mac/Linux attach when those jobs succeed.
  github-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: needs.build-windows.result == 'success' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: EDR-Windows
          path: release

      - name: Download macOS artifact (optional)
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: EDR-macOS
          path: release

      - name: Download Linux artifact (optional)
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: EDR-Linux
          path: release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find release -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found under release/"
            find release || true
            exit 1
          fi
          printf 'Publishing:\n  %s\n' "${files[@]}"
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --generate-notes \
            "${files[@]}"
