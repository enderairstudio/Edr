name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: pwsh
        run: ./build.ps1

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EDR-Windows
          path: |
            dist/EDR-Setup.exe
            dist/EDR-Install.zip
            dist/EDR-win64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS package
        run: |
          perl -pi -e 's/\r$//' build-unix.sh scripts/edr scripts/install-macos.sh
          chmod +x build-unix.sh scripts/edr scripts/install-macos.sh
          bash ./build-unix.sh macos
          test -f dist/EDR-Setup.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDR-macOS
          path: dist/EDR-Setup.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dpkg-dev

      - name: Build Linux package
        run: |
          sed -i 's/\r$//' build-unix.sh scripts/edr scripts/install-linux.sh
          chmod +x build-unix.sh scripts/edr scripts/install-linux.sh
          bash ./build-unix.sh linux
          test -f dist/EDR-Setup.deb

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: EDR-Linux
          path: dist/EDR-Setup.deb

  # Windows is required for a public release; Mac/Linux attach when those jobs succeed.
  github-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') &&
      needs.build-windows.result == 'success' &&
      needs.build-macos.result == 'success' &&
      needs.build-linux.result == 'success'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: EDR-Windows
          path: release

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: EDR-macOS
          path: release/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: EDR-Linux
          path: release/linux

      - name: Stage release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          shopt -s nullglob
          pick() {
            for path in "$@"; do
              if [ -f "$path" ]; then
                name="$(basename "$path")"
                cp "$path" "release-assets/$name"
                echo "  + $name"
                return 0
              fi
            done
            return 1
          }
          echo "Collecting installers:"
          pick release/**/EDR-Setup.exe release/EDR-Setup.exe
          pick release/**/EDR-Install.zip release/EDR-Install.zip
          pick release/**/EDR-win64.zip release/EDR-win64.zip
          pick release/macos/**/EDR-Setup.dmg release/macos/EDR-Setup.dmg
          pick release/linux/**/EDR-Setup.deb release/linux/EDR-Setup.deb
          ls -la release-assets/
          count="$(find release-assets -maxdepth 1 -type f | wc -l)"
          if [ "$count" -lt 3 ]; then
            echo "Expected at least 3 release files (Windows + macOS + Linux)."
            find release -type f | head -50 || true
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-assets/*)
          printf 'Publishing:\n  %s\n' "${files[@]}"
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
